# Cut a release whenever a new tag is pushed to the repo.
name: "Release: Publish"

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "release tag: tag that will be released"
        required: true
        type: string
      publish_to_pypi:
        description: 'Publish to PyPI'
        required: true
        type: boolean
        default: true
    secrets:
      publish_token:
        required: false
  workflow_call:
    inputs:
      tag_name:
        description: "release tag: tag that will be released"
        required: true
        type: string
      publish_to_pypi:
        description: 'Publish to PyPI'
        required: false
        type: boolean
        default: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag_name || github.ref_name }}
      - name: Create release archive and notes
        run: .github/workflows/create_archive_and_notes.sh ${{ inputs.tag_name || github.ref_name }}
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          # Use GH feature to populate the changelog automatically
          generate_release_notes: true
          body_path: release_notes.txt
          prerelease: ${{ contains( (inputs.tag_name || github.ref), '-rc') }}
          fail_on_unmatched_files: true
          files: rules_python-*.tar.gz
          tag_name: ${{ inputs.tag_name || github.ref_name }}

  publish_bcr:
    needs: release
    uses: ./.github/workflows/publish.yml
    with:
      tag_name: ${{ inputs.tag_name || github.ref_name }}
    secrets:
      publish_token: ${{ secrets.publish_token || secrets.BCR_PUBLISH_TOKEN }}

  publish_pypi:
    # We just want publish_pypi last, since once uploaded, it can't be changed.
    needs: publish_bcr
    if: github.event_name == 'push' || inputs.publish_to_pypi
    uses: ./.github/workflows/publish_pypi.yaml
    with:
      tag_name: ${{ inputs.tag_name || github.ref_name }}
    secrets: inherit
