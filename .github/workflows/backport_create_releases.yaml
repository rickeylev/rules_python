name: "Backport: Create Releases"

on:
  workflow_dispatch:
    inputs:
      issue:
        description: 'The Backport Tracking Issue Number'
        required: true
        type: string
  workflow_call:
    inputs:
      issue:
        description: 'The Backport Tracking Issue Number'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  backport_create_releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: 1.20.0

      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Backport Create Releases Pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ inputs.issue }}
        run: |
          bazel run //tools/private/release -- \
            backport-create-releases --issue=$ISSUE --no-dry-run
